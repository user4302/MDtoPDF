[build]
  publish = ".next"
  command = "npm run build && npx puppeteer browsers install chrome"

[build.environment]
  NODE_VERSION = "20"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "false"
  PUPPETEER_EXECUTABLE_PATH = "/opt/buildhome/.puppeteer/chromium"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["puppeteer"]
